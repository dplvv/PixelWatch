services:
  web:
    build: .
    container_name: pixelwatch-web
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    env_file:
      - .env
    volumes:
      - ./:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build: .
    container_name: pixelwatch-worker
    command: celery -A app.core.celery_app.celery_app worker --loglevel=info
    env_file:
      - .env
    volumes:
      - ./:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  beat:
    build: .
    container_name: pixelwatch-beat
    command: celery -A app.core.celery_app.celery_app beat --loglevel=info
    env_file:
      - .env
    volumes:
      - ./:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  db:
    image: postgres:16-alpine
    container_name: pixelwatch-db
    environment:
      POSTGRES_USER: pixelwatch
      POSTGRES_PASSWORD: pixelwatch
      POSTGRES_DB: pixelwatch
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pixelwatch -d pixelwatch"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: pixelwatch-redis
    ports:
      - "6379:6379"

volumes:
  pg_data:
